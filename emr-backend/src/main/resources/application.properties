# =========================
# SERVER CONFIG
# =========================
server.port=8080

# =========================
# DATABASE CONFIG (PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/emr_cdss
spring.datasource.username=postgres
spring.datasource.password=pride@1983
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool stability (important for real apps)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Modern Hibernate dialect handling (recommended for Spring Boot 3+)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Prevent lazy loading issues in REST APIs
spring.jpa.open-in-view=false

# =========================
# CDSS / AI SERVICE CONFIG
# =========================
cdss.flask.url=https://cdss-engine.onrender.com/predict

# =========================
# OPTIONAL DEBUGGING
# =========================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE